    type: APIReference
    note: v3 Services Public API reference. Session/study/patient/user/group/account/namespace/webhook commands, sid auth, filtering, pagination, and the /bundle endpoint. No WebSocket documented.
  - url: https://ambrahealth.com/platform/developer-tools/apis/
    type: Documentation
    note: Ambra Health developer tools / APIs landing (redirects into Intelerad interoperability). Enterprise, contact-sales positioning.
  - url: https://dicomgrid.github.io/sdk-python/index.html
    type: Documentation
    note: Open-source Python SDK (Apache-2.0) wrapping the v3 Services API and Storage API. sid or username/password auth. No WebSocket.
  - url: https://dicomgrid.github.io/sdk-python/storage_api.html
    type: Documentation
