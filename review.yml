  endpointsModeled:
    - note: |
        Endpoint paths and verbs above are confirmed from the public v3 reference.
        The request/response JSON body schemas in the OpenAPI document are honestly
        modeled - the reference documents commands and parameters but does not
        publish per-field JSON Schemas. Schemas are marked x-schema-status = modeled
        and the webhook event catalog (study.arrived, study.updated, study.shared,
        study.approved, study.rejected, study.deleted) is representative, not an
        enumerated published list.
  transportsNote: |
    The only realtime/async surface Ambra exposes is outbound webhooks (HTTP POST
    callbacks). There is no client-initiated WebSocket transport, so an AsyncAPI
    WebSocket document is not warranted.
sources:
