actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on Ambra Health's own API. The public v3
    Services API is request/response REST over HTTPS with sid auth, and realtime
    notification is delivered via outbound HTTP webhooks rather than a
    client-connected WebSocket. No AsyncAPI document was created because there is
    no server-push WebSocket/SSE transport on Ambra's own API to model.
