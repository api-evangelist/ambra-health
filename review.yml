aid: ambra-health
name: Ambra Health
review:
  question: Does Ambra Health expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Ambra Health's public developer surface -
    the v3 Services Public API (historically the DICOM Grid API) at
    https://access.dicomgrid.com/api/v3 - is request/response REST over HTTPS,
    authenticated with a session id (sid). There is no documented server-push
    transport (WebSocket ws://wss:// or SSE) on Ambra's own API to model. Ambra
    does offer webhooks (/webhook/add, /webhook/list, /webhook/event), but those
    are outbound server-to-endpoint HTTP POST callbacks, not a bidirectional
    WebSocket the client connects to, so they would be modeled as HTTP callbacks
    rather than an AsyncAPI WebSocket channel.
findings:
  summary: |
    Ambra Health does not publish a documented public WebSocket API. Ambra Health
    (now part of Intelerad Medical Systems and rebranded InteleShare) is a
    cloud-based medical image management, exchange, and interoperability platform -
    a cloud VNA / PACS for storing, viewing, routing, and sharing DICOM imaging.
    Its public programmatic surface is the v3 Services Public API (the DICOM Grid
    API), base https://access.dicomgrid.com/api/v3 (access.ambrahealth.com is an
    alias). It is JSON over HTTPS, authenticated with a session id (sid) from
    POST /session/login, supplied as a parameter or via the X-AmbraHealth-SID
    header. Commands are grouped into session, study, patient, user, group,
    account, namespace, sharing, storage/dicomdata/annotation, and webhook
    families, with filtering (filter.FIELD.CONDITION), sorting, pagination, and a
    /bundle endpoint for batching. Realtime notification is delivered via outbound
    webhooks, not a WebSocket. No ws:// or wss:// endpoint is documented anywhere
    in the v3 reference or the open-source Python SDK as of the review date.
  openSource: |
    Ambra's API itself is a proprietary, enterprise (contract-sales) platform
    capability, not open source. However, Ambra publishes an open-source Python
    SDK (Apache-2.0) at github.com/dicomgrid/sdk-python (docs at
    dicomgrid.github.io/sdk-python) that wraps the v3 Services API and the Storage
    API, organized into service namespaces (Study, Patient, Namespace, Account,
    Annotation, Audit, Analytics, Destination, Anonymization, and more). The SDK
    authenticates with the API URL plus a sid or username/password.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://access.dicomgrid.com/api/v3
      documented: true
      note: v3 Services Public API. JSON over HTTPS, sid auth via parameter or X-AmbraHealth-SID header. access.ambrahealth.com is an alias base.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outbound HTTP POST callbacks configured via /webhook/add. Server-to-endpoint, not a client WebSocket. Event catalog is not enumerated in the public reference.
    - protocol: Bundle (HTTP)
      scheme: https
      documented: true
      note: POST /bundle runs a JSON array of calls sequentially in one request; inherit_sid + X-AmbraHealth-SID share a session across bundled calls.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the Ambra Health v3 Services API reference or the open-source Python SDK as of the review date.
