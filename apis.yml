aid: ambra-health
url: https://raw.githubusercontent.com/api-evangelist/ambra-health/refs/heads/main/apis.yml
name: Ambra Health
kind: company
description: Ambra Health (now part of Intelerad Medical Systems, and rebranded as
  InteleShare) is a cloud-based medical image management, exchange, and interoperability
  platform - a cloud VNA and PACS that lets healthcare providers, patients, and
  researchers store, view, route, and share diagnostic imaging in real time without
  a VPN or CD. Its imaging data is DICOM, and its v3 Services Public API (historically
  the DICOM Grid API) exposes programmatic control over studies, patients, users,
  groups, accounts, namespaces, sharing, storage/images, and webhooks. The REST API
  is JSON over HTTPS and is authenticated with a session id (sid) obtained from
  /session/login. Intelerad acquired Ambra Health in 2021 to form a $1.7B cloud PACS
  and enterprise-imaging leader.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Medical Imaging
- DICOM
- Healthcare
- PACS
- Image Exchange
- Interoperability
- VNA
- Cloud Imaging
created: '2026-07-05'
modified: '2026-07-05'
