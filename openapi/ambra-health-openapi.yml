  /webhook/delete:
    post:
      operationId: webhookDelete
      tags: [Webhooks]
      summary: Delete a webhook
      x-endpoint-status: confirmed
      parameters:
      - $ref: '#/components/parameters/Sid'
      - { name: uuid, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          $ref: '#/components/responses/Status'
  /webhook/event:
    get:
      operationId: webhookEvent
      tags: [Webhooks]
      summary: Inspect webhook events
      description: >-
        The reference confirms a webhook/event command but does not enumerate the
        available event types; the event catalog below is honestly modeled from
        common Ambra study lifecycle activity.
      x-endpoint-status: confirmed
      parameters:
      - $ref: '#/components/parameters/Sid'
      - { name: uuid, in: query, schema: { type: string } }
      responses:
        '200':
          description: Webhook event(s)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebhookEvent' }

  /bundle:
    post:
      operationId: bundle
      tags: [Session]
      summary: Execute multiple API calls in a single request
      description: >-
        POST a JSON array of hashes, each with a URL key plus parameters. Calls are
        processed sequentially and results returned in matching order. The
        inherit_sid flag plus the X-AmbraHealth-SID header let bundled calls share
        one session.
      x-endpoint-status: confirmed
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  URL: { type: string }
                additionalProperties: true
      responses:
        '200':
          description: Ordered array of results
          content:
            application/json:
              schema: { type: array, items: { type: object, additionalProperties: true } }
components:
  parameters:
    Sid:
      name: sid
      in: query
      required: true
      description: Session id from POST /session/login. May also be sent via the X-AmbraHealth-SID header.
      schema: { type: string }
  responses:
    Error:
      description: Error - the API returns an HTTP error code plus a JSON error structure
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Status:
      description: Status result
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Status' }
    StudyResponse:
      description: A study
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Study' }
    PatientResponse:
      description: A patient
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Patient' }
    UserResponse:
      description: A user
      content:
        application/json:
          schema: { $ref: '#/components/schemas/User' }
    GroupResponse:
      description: A group
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Group' }
    AccountResponse:
      description: An account
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Account' }
    WebhookResponse:
      description: A webhook
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Webhook' }
  securitySchemes:
    sessionId:
      type: apiKey
      in: header
      name: X-AmbraHealth-SID
      description: Session id (sid) obtained from POST /session/login. Also accepted as the sid request parameter.
  schemas:
    LoginRequest:
      type: object
      x-schema-status: modeled
      required: [login, password]
      properties:
        login: { type: string, description: Username or email }
        password: { type: string, format: password }
        account_login: { type: string }
    Session:
      type: object
      x-schema-status: modeled
      properties:
        sid: { type: string, description: Session id used to authorize subsequent calls }
        status: { type: string, example: OK }
        user_id: { type: string }
    Status:
      type: object
      properties:
        status: { type: string, example: OK }
    Error:
      type: object
      properties:
        status: { type: string, example: ERROR }
        error_type: { type: string }
        error_subtype: { type: string }
        message: { type: string }
    Study:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        study_uid: { type: string, description: DICOM StudyInstanceUID }
        patient_name: { type: string }
        patientid: { type: string }
        modality: { type: string, example: CT }
        study_date: { type: string }
        study_description: { type: string }
        namespace_id: { type: string }
        phi_namespace: { type: string }
        created: { type: string, format: date-time }
    StudyWrite:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string, description: Present on update }
        namespace_id: { type: string }
        study_description: { type: string }
        modality: { type: string }
    StudyList:
      type: object
      x-schema-status: modeled
      properties:
        page:
          type: object
          properties:
            number: { type: integer }
            rows: { type: integer }
            total: { type: integer }
        studies:
          type: array
          items: { $ref: '#/components/schemas/Study' }
    Patient:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        name: { type: string }
        patientid: { type: string, description: MRN / patient identifier }
        birth_date: { type: string }
        sex: { type: string, enum: [M, F, O, U] }
        namespace_id: { type: string }
    User:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        first: { type: string }
        last: { type: string }
        role: { type: string }
    Group:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        name: { type: string }
        account_id: { type: string }
        namespace_id: { type: string }
    Account:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        name: { type: string }
        namespace_id: { type: string }
        settings: { type: object, additionalProperties: true }
    Namespace:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        name: { type: string }
        type: { type: string, enum: [Account, Group], description: Namespaces are accounts or groups }
    Share:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        study_id: { type: string }
        target_type: { type: string, enum: [user, group, account] }
        target_id: { type: string }
        created: { type: string, format: date-time }
    ShareRequest:
      type: object
      x-schema-status: modeled
      required: [uuid]
      properties:
        uuid: { type: string, description: Study uuid }
        account_id: { type: string }
        group_id: { type: string }
        user_id: { type: string }
        email: { type: string, format: email }
        message: { type: string }
    Annotation:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        study_id: { type: string }
        image_id: { type: string }
        frame: { type: integer }
        data: { type: object, additionalProperties: true }
    AuditEntry:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        action: { type: string }
        user_id: { type: string }
        created: { type: string, format: date-time }
        detail: { type: object, additionalProperties: true }
    Webhook:
      type: object
      x-schema-status: modeled
      properties:
        uuid: { type: string }
        namespace_id: { type: string }
        url: { type: string, format: uri, description: Endpoint Ambra POSTs events to }
        event: { type: string, description: Event the webhook fires on }
        enabled: { type: boolean }
    WebhookEvent:
      type: object
      x-schema-status: modeled
      description: >-
        Honestly modeled - the reference confirms webhook/event but does not
        publish the event catalog. Representative event names below.
      properties:
        uuid: { type: string }
        event:
          type: string
          example: study.arrived
          enum:
          - study.arrived
          - study.updated
          - study.shared
          - study.approved
          - study.rejected
          - study.deleted
        namespace_id: { type: string }
        study_id: { type: string }
        occurred: { type: string, format: date-time }
security:
- sessionId: []
