description: >-
  FinOps view of Ambra Health (InteleShare) spend. Ambra is an enterprise,
  contract-priced healthcare imaging platform sold by Intelerad, not a usage-metered
  public API with per-call billing. Cost is a negotiated annual platform
  subscription driven by the modules licensed (cloud VNA / PACS, image exchange,
  patient/provider portal, viewer, research), stored image / study volume, number
  of sites and users, and support / SLA tier. The v3 Services Public API is an
  included capability of that agreement rather than a separately invoiced line item,
  so API-level cost optimization is about efficient integration (bundling calls,
  scoping study routing and retention) rather than trimming per-request spend.
notes: >-
  No public per-unit rates exist to reconcile; the dominant cost drivers are
  storage volume and licensed modules under the enterprise agreement. Confirm
  billing structure, storage tiers, and any overage terms directly with Ambra
  Health / Intelerad.
