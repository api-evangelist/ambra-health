meters:
- name: platform_subscription
  description: Annual subscription for the licensed Ambra Health / InteleShare modules.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - modules
- name: storage_volume
  description: Stored DICOM image / study data volume in the Ambra cloud (primary cost driver).
  unit: bytes
  aggregation: sum
  dimensions:
  - account
  - namespace
- name: study_volume
  description: Studies / exams stored, exchanged, or routed through the platform.
  unit: studies
  aggregation: sum
  dimensions:
  - account
  - namespace
- name: seats
  description: Licensed users / sites under the agreement.
  unit: users
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Track stored study and image volume per namespace/account, since storage is the dominant driver of Ambra platform cost.
- name: Allocation
  description: Map namespaces (accounts and groups) to facilities, departments, or cost centers so imaging spend is attributable.
- name: Optimization
  description: Apply retention and routing policies to avoid storing unneeded studies; use the /bundle endpoint to integrate efficiently; right-size licensed modules and seats.
- name: Accountability
  description: Review the annual agreement against actual storage and study volume; renegotiate module scope and storage tiers as imaging needs change.
